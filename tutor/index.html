<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 출근길 법령 튜터 — 도로교통법 한눈에</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f7f4; --card: #fff; --border: #e5e3dd;
  --text: #1f2937; --sub: #6b7280;
  --law: #1e3a5f; --law-bg: #eef2f7; --law-light: #dbe4ee;
  --decree: #5b4b8a; --rule: #1e6a5e;
  --warn: #d97706; --warn-bg: #fef3c7;
  --analysis: #0e7490; --analysis-bg: #ecfeff;
  --teaching: #b45309; --teaching-bg: #fff7ed;
  --shadow: 0 1px 3px rgba(0,0,0,0.05);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans KR', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.7; font-size: 14px;
  max-width: 800px; margin: 0 auto; padding: 16px;
}
header {
  background: linear-gradient(135deg, #1a5276 0%, #2980b9 100%);
  color: #fff; padding: 22px 24px; border-radius: 8px; margin-bottom: 14px;
}
header h1 { font-size: 21px; margin-bottom: 6px; font-weight: 700; }
header p { font-size: 13px; opacity: 0.9; }
header a { color: #ffe; text-decoration: underline; }

.date-nav {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  background: var(--card); padding: 10px 14px; border-radius: 8px;
  margin-bottom: 14px; box-shadow: var(--shadow); font-size: 13px;
}
.date-nav input[type="date"] {
  padding: 5px 8px; border: 1px solid var(--border); border-radius: 5px;
  font-family: inherit; font-size: 13px;
}
.date-nav .today-link { margin-left: auto; color: var(--law); text-decoration: none; font-weight: 500; }
.date-nav .today-link:hover { text-decoration: underline; }

.card {
  background: var(--card); border-radius: 10px; padding: 24px;
  margin-bottom: 12px; box-shadow: var(--shadow); border-left: 4px solid var(--law);
}
.card.law { border-left-color: var(--law); }
.card.decree { border-left-color: var(--decree); }
.card.rule { border-left-color: var(--rule); }
.card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 4px;
  font-size: 11px; font-weight: 600; color: #fff;
}
.badge.law { background: var(--law); }
.badge.decree { background: var(--decree); }
.badge.rule { background: var(--rule); }
.badge.current { background: #475569; }
.badge.cat { background: var(--law-bg); color: var(--law); }
.card-date { font-size: 12px; color: var(--sub); }
.jo-label { font-size: 13px; color: var(--law); font-weight: 600; margin-bottom: 6px; }
.oneliner {
  font-size: 21px; font-weight: 700; color: var(--text);
  margin-bottom: 12px; line-height: 1.45; word-break: keep-all;
}
.explanation {
  font-size: 14.5px; color: var(--text); line-height: 1.75;
  margin-bottom: 12px; word-break: keep-all;
}
.source {
  display: inline-block; font-size: 12px; color: var(--law);
  background: var(--law-bg); padding: 4px 12px; border-radius: 4px; font-weight: 500;
}
.llm-skip-banner {
  font-size: 13px; color: var(--warn); background: var(--warn-bg);
  padding: 10px 14px; border-radius: 6px; margin-bottom: 12px;
  border-left: 3px solid var(--warn);
}

.section {
  background: var(--card); border-radius: 10px; padding: 16px 20px;
  margin-bottom: 12px; box-shadow: var(--shadow); border-left: 4px solid var(--law-light);
}
.section.analysis { border-left-color: var(--analysis); background: linear-gradient(to right, var(--analysis-bg), var(--card) 45%); }
.section.teaching { border-left-color: var(--teaching); }
.section.study { border-left-color: var(--rule); }
.section.cases { border-left-color: var(--decree); }
.section.issues { border-left-color: var(--warn); }
.section.refs { border-left-color: var(--sub); }
.section h3 {
  font-size: 14px; font-weight: 600; color: var(--law);
  margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
}
.section h3 .count {
  font-size: 11px; font-weight: 500; color: var(--sub);
  background: var(--bg); padding: 2px 8px; border-radius: 10px;
}
.section-body { font-size: 14px; line-height: 1.75; color: var(--text); word-break: keep-all; }
.insight-list { padding-left: 20px; font-size: 13.5px; line-height: 1.8; }
.insight-list li { margin-bottom: 6px; word-break: keep-all; }

.teaching-box {
  background: var(--teaching-bg); border-radius: 6px; padding: 10px 12px;
  font-size: 13.5px; line-height: 1.7; margin-top: 8px;
}
.teaching-box strong { color: var(--teaching); }

.case-item {
  border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; background: var(--bg); margin-top: 10px;
}
.case-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.case-no {
  font-family: 'Courier New', monospace; font-size: 12px; font-weight: 600;
  color: var(--sub); background: var(--card); padding: 2px 8px;
  border-radius: 4px; border: 1px solid var(--border);
}
.case-type {
  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 3px;
  background: var(--law-bg); color: var(--law);
}
.case-type.court { background: #ede9fe; color: var(--decree); }
.case-result { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 3px; }
.case-result.accept { background: #ecf5f2; color: var(--rule); }
.case-result.reject { background: #fee2e2; color: #b91c1c; }
.case-result.etc { background: #f3f4f6; color: var(--sub); }
.case-title { font-size: 13.5px; font-weight: 600; margin-bottom: 6px; line-height: 1.5; word-break: keep-all; }
.case-lesson {
  font-size: 13px; line-height: 1.65; padding: 8px 10px;
  background: var(--law-bg); border-left: 3px solid var(--law-light);
  border-radius: 5px; margin-bottom: 8px;
}
.case-full { margin-top: 6px; }
.case-full summary {
  cursor: pointer; font-size: 12px; color: var(--law); user-select: none; list-style: none;
}
.case-full summary::-webkit-details-marker { display: none; }
.case-full summary::before { content: '▶ 판례 전문 보기'; }
.case-full[open] summary::before { content: '▼ 판례 전문 접기'; }
.case-full pre {
  margin-top: 8px; padding: 12px; background: var(--card);
  border: 1px solid var(--border); border-radius: 6px;
  font-size: 12px; line-height: 1.8; white-space: pre-wrap;
  word-break: keep-all; font-family: inherit;
  max-height: 380px; overflow-y: auto; color: var(--text);
}

.refs-item { font-size: 13px; line-height: 1.65; margin-top: 8px; }
.refs-item .refs-src {
  font-size: 11px; font-weight: 600; color: var(--decree);
  background: #ede9fe; padding: 1px 7px; border-radius: 3px;
}

.revision-raw { border-left-color: var(--sub); }
.revision-raw summary {
  cursor: pointer; font-size: 13px; font-weight: 600; color: var(--law);
  user-select: none; list-style: none;
}
.revision-raw summary::-webkit-details-marker { display: none; }
.revision-raw summary::before { content: '▶ '; font-size: 10px; }
.revision-raw[open] summary::before { content: '▼ '; }
.revision-raw pre {
  margin-top: 10px; padding: 12px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 6px;
  font-size: 12px; line-height: 1.8; white-space: pre-wrap;
  word-break: keep-all; font-family: inherit;
  max-height: 280px; overflow-y: auto;
}

.view-law {
  display: block; text-align: center; background: var(--law); color: #fff;
  text-decoration: none; padding: 12px 18px; border-radius: 8px;
  font-size: 14px; font-weight: 600; margin-top: 4px;
}
.view-law:hover { background: #14264a; }

.empty, .loading {
  text-align: center; padding: 60px 20px; color: var(--sub);
  background: var(--card); border-radius: 10px; box-shadow: var(--shadow);
}
.empty .icon { font-size: 56px; margin-bottom: 16px; }
.empty p { margin-bottom: 8px; }
.empty .sub { font-size: 13px; }

footer { text-align: center; padding: 20px 10px; color: var(--sub); font-size: 12px; }
footer a { color: var(--sub); text-decoration: underline; }

@media (max-width: 600px) {
  body { padding: 8px; }
  header { padding: 16px 18px; }
  header h1 { font-size: 18px; }
  .card { padding: 18px; }
  .section { padding: 14px 16px; }
  .oneliner { font-size: 18px; }
  .date-nav { flex-direction: column; align-items: stretch; }
  .date-nav .today-link { margin-left: 0; text-align: right; }
}
</style>
</head>
<body>

<header>
  <h1>📚 출근길 법령 튜터</h1>
  <p>매일 한 건 — 도로교통법 현행 + 해설 + 판례 통합 학습 — <a href="../viewer.html">전체 뷰어</a></p>
</header>

<nav class="date-nav">
  <label for="dateInput">날짜:</label>
  <input type="date" id="dateInput">
  <a href="./" class="today-link">오늘로 →</a>
</nav>

<main id="content">
  <div class="loading">⏳ 학습 자료 로딩 중...</div>
</main>

<footer>
  데이터 출처: <a href="https://www.law.go.kr" target="_blank">국가법령정보센터</a> ·
  해설집·판례·행정심판례 RAG · AI 생성 (코드 자기검증)
</footer>

<script>
const LAW_TYPE_CLASS = { '법률': 'law', '시행령': 'decree', '시행규칙': 'rule' };

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtDate(s) {
  if (!s || s.length !== 8) return s || '';
  return s.slice(0,4) + '.' + s.slice(4,6) + '.' + s.slice(6,8);
}
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}
function resultClass(r) {
  r = String(r || '');
  if (r.includes('인용') || r.includes('무죄')) return 'accept';
  if (r.includes('기각') || r.includes('유죄')) return 'reject';
  return 'etc';
}

// 판례 전문 문단 분리 — 항목 기호 앞 줄바꿈. 날짜는 보호 후 복원.
function formatJudgment(text) {
  if (!text) return '';
  let t = String(text);
  const saved = [];
  // 날짜(YYYY. M. D.) 보호 — @@D0@@ 형태 placeholder (본문 충돌 없음)
  t = t.replace(/\d{4}\s*\.\s*\d{1,2}\s*\.\s*\d{1,2}\s*\.?/g, function(m) {
    saved.push(m);
    return '@@D' + (saved.length - 1) + '@@';
  });
  t = t.replace(/\s+(\[\d+\])/g, '\n\n$1');       // [1] [2]
  t = t.replace(/\s+(\d{1,2}\.\s)/g, '\n\n$1');    // 1. 2. 3.
  t = t.replace(/\s+([가-하]\.\s)/g, '\n$1');      // 가. 나. 다.
  t = t.replace(/\s+(○\s)/g, '\n$1');              // ○
  t = t.replace(/@@D(\d+)@@/g, function(_, i) { return saved[+i]; });  // 날짜 복원
  t = t.replace(/\n{3,}/g, '\n\n');
  return t.trim();
}

async function loadDaily(date) {
  const r = await fetch('data/daily_' + date + '.json', { cache: 'no-store' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function renderMainCard(card) {
  const li = card.law_info || {};
  const lc = card.learning_content || {};
  const llmOk = card.llm_status === 'ok';
  const jo = li.매핑법률조문 || '?';
  const rev = li.recent_revision;
  const lawClass = rev ? (LAW_TYPE_CLASS[rev.법령유형] || 'law') : 'law';
  const cat = (li.categories && li.categories[0]) || (card.selection_basis && card.selection_basis.category) || '';

  const badge = rev
    ? '<span class="badge ' + lawClass + '">' + esc(rev.법령유형) + ' · 최근 개정</span>'
    : '<span class="badge current">현행 법령</span>';
  const catBadge = cat ? '<span class="badge cat">' + esc(cat) + '</span>' : '';
  const dateInfo = rev
    ? '<span class="card-date">공포 ' + esc(fmtDate(rev.공포일자)) + ' · 시행 ' + esc(fmtDate(rev.시행일자)) + '</span>'
    : '';

  if (llmOk) {
    return '<article class="card ' + lawClass + '">'
      + '<div class="card-header">' + badge + catBadge + dateInfo + '</div>'
      + '<div class="jo-label">📖 ' + esc(lc.source_article || ('도로교통법 제' + jo + '조')) + '</div>'
      + '<h2 class="oneliner">' + esc(lc.oneliner) + '</h2>'
      + '<p class="explanation">' + esc(lc.explanation) + '</p>'
      + '</article>';
  }
  return '<article class="card ' + lawClass + '">'
    + '<div class="card-header">' + badge + catBadge + dateInfo + '</div>'
    + '<div class="jo-label">📖 도로교통법 제' + esc(jo) + '조</div>'
    + '<div class="llm-skip-banner">⚠️ 이 날짜는 학습 콘텐츠가 아직 생성되지 않았습니다 (' + esc(card.llm_status) + '). 조문 정보만 표시합니다.</div>'
    + '</article>';
}

function renderAnalysis(lc) {
  if (!lc.case_analysis) return '';
  return '<section class="section analysis">'
    + '<h3>🔍 인용·기각 법리 분석</h3>'
    + '<div class="section-body">' + esc(lc.case_analysis) + '</div>'
    + '</section>';
}

function renderStudy(lc) {
  const pts = lc.study_points || [];
  const teaching = lc.teaching_application;
  if (pts.length === 0 && !teaching) return '';
  const list = pts.length
    ? '<ul class="insight-list">' + pts.map(function(p){ return '<li>' + esc(p) + '</li>'; }).join('') + '</ul>'
    : '';
  const tbox = teaching
    ? '<div class="teaching-box"><strong>📌 교통안전교육 적용:</strong> ' + esc(teaching) + '</div>'
    : '';
  return '<section class="section study">'
    + '<h3>📝 학습 포인트 ' + (pts.length ? '<span class="count">' + pts.length + '</span>' : '') + '</h3>'
    + list + tbox
    + '</section>';
}

function renderCases(card) {
  const lc = card.learning_content || {};
  const cases = lc.related_cases || [];
  if (cases.length === 0) return '';
  const fullMap = {};
  (card.related_cases_full || []).forEach(function(f){ fullMap[f.case_no] = f; });

  const items = cases.map(function(c) {
    const full = fullMap[c.case_no] || {};
    const typeLabel = c.type === 'court' ? '법원판례' : '행정심판';
    const typeClass = c.type === 'court' ? 'court' : '';
    const courtDate = full.court
      ? '<span class="card-date">' + esc(full.court) + (full.date ? ' · ' + esc(full.date) : '') + '</span>'
      : '';
    const fullText = full.full_text || '';
    const fullPanel = fullText
      ? '<details class="case-full"><summary></summary><pre>' + esc(formatJudgment(fullText)) + '</pre></details>'
      : '';
    return '<div class="case-item">'
      + '<div class="case-head">'
      + '<span class="case-no">' + esc(c.case_no) + '</span>'
      + '<span class="case-type ' + typeClass + '">' + typeLabel + '</span>'
      + (c.result ? '<span class="case-result ' + resultClass(c.result) + '">' + esc(c.result) + '</span>' : '')
      + courtDate
      + '</div>'
      + '<div class="case-title">' + esc(c.title) + '</div>'
      + (c.lesson ? '<div class="case-lesson">💡 ' + esc(c.lesson) + '</div>' : '')
      + fullPanel
      + '</div>';
  }).join('');

  return '<section class="section cases">'
    + '<h3>⚖️ 관련 판례·행정심판례 <span class="count">' + cases.length + '</span></h3>'
    + items
    + '</section>';
}

function renderIssues(lc) {
  const issues = lc.key_issues || [];
  if (issues.length === 0) return '';
  return '<section class="section issues">'
    + '<h3>🎯 핵심 쟁점 <span class="count">' + issues.length + '</span></h3>'
    + '<ul class="insight-list">' + issues.map(function(i){ return '<li>' + esc(i) + '</li>'; }).join('') + '</ul>'
    + '</section>';
}

function renderRefs(card) {
  const sm = card.source_materials || {};
  const law = sm.law_comment;
  const topics = sm.topic_docs || [];
  if (!law && topics.length === 0) return '';
  let inner = '';
  if (law) {
    const txt = law.length > 420 ? law.slice(0, 420) + ' …' : law;
    inner += '<div class="refs-item"><span class="refs-src">도로교통법 해설집</span> ' + esc(txt) + '</div>';
  }
  topics.forEach(function(t) {
    const ex = t.excerpt || '';
    const txt = ex.length > 340 ? ex.slice(0, 340) + ' …' : ex;
    inner += '<div class="refs-item"><span class="refs-src">' + esc(t.doc_id) + '</span> '
      + '<strong>' + esc(t.title) + '</strong><br>' + esc(txt) + '</div>';
  });
  return '<section class="section refs">'
    + '<h3>📚 참고 자료 (해설집·실무연구)</h3>' + inner + '</section>';
}

function renderRevisionRaw(card) {
  const rev = card.law_info && card.law_info.recent_revision;
  if (!rev || !rev.제개정이유_원본) return '';
  return '<details class="section revision-raw">'
    + '<summary>📄 제개정 이유 원문 (' + esc(rev.법령명 || '') + ' · 공포 ' + esc(fmtDate(rev.공포일자)) + ')</summary>'
    + '<pre>' + esc(rev.제개정이유_원본) + '</pre>'
    + '</details>';
}

function renderViewLaw(card) {
  const jo = (card.law_info && card.law_info.매핑법률조문) || '';
  const link = (card.law_info && card.law_info.viewer_link) || ('../viewer.html?jo=' + jo);
  return '<a href="' + esc(link) + '" class="view-law">📖 도로교통법 제' + esc(jo) + '조 본문·연혁 보기 →</a>';
}

function renderCard(card) {
  // 순서: 메인 → 인용이유분석 → 학습포인트 → 관련판례 → 핵심쟁점 → 제개정이유원문 → 법령본문보기
  const lc = card.learning_content || {};
  const llmOk = card.llm_status === 'ok';
  return [
    renderMainCard(card),
    llmOk ? renderAnalysis(lc) : '',
    llmOk ? renderStudy(lc) : '',
    llmOk ? renderCases(card) : '',
    llmOk ? renderIssues(lc) : '',
    llmOk ? renderRefs(card) : '',
    renderRevisionRaw(card),
    renderViewLaw(card)
  ].join('');
}

function renderEmpty(date, reason) {
  return '<div class="empty"><div class="icon">🌅</div>'
    + '<p>' + esc(date) + ' — 학습 자료가 없습니다.</p>'
    + '<p class="sub">' + esc(reason || '매일 새벽 자동 갱신됩니다.') + '</p></div>';
}
function renderError(date, msg) {
  return '<div class="empty"><div class="icon">📭</div>'
    + '<p>' + esc(date) + ' 학습 자료를 찾을 수 없습니다.</p>'
    + '<p class="sub">' + esc(msg) + '</p></div>';
}

async function render(date) {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading">⏳ 학습 자료 로딩 중...</div>';
  try {
    const data = await loadDaily(date);
    if (data.status === 'skip' || !Array.isArray(data.cards) || data.cards.length === 0) {
      el.innerHTML = renderEmpty(date, data.reason);
      return;
    }
    el.innerHTML = renderCard(data.cards[0]);
  } catch (e) {
    el.innerHTML = renderError(date, e.message);
  }
}

function init() {
  const date = new URLSearchParams(location.search).get('date') || todayStr();
  const di = document.getElementById('dateInput');
  di.value = date;
  di.addEventListener('change', function(ev){ if (ev.target.value) location.search = '?date=' + ev.target.value; });
  render(date);
}
init();
</script>
</body>
</html>
