name: 매주 자동 갱신

# ─────────────────────────────────────────────────────
# 도로교통법 한눈에 — 매주 정기 자동 갱신 워크플로
#
# 동작:
#   - 매주 월요일 새벽 05:00 KST (= 일요일 20:00 UTC) 자동 실행
#     (02:00 KST → 05:00 KST 변경: 법제처 야간 점검 시간대 회피)
#   - 수동 실행도 가능 (Actions 탭 → "Run workflow")
#   - update_all.py 실행 → 빌드 검증 → 변경 시 commit·push
#   - 결과(성공/실패)를 GitHub Issue로 생성 → 회사 메일에 알림
#     ("[클로드 코드가 회신]" 제목 prefix로 식별)
# ─────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 20 * * 0'  # 매주 일요일 20:00 UTC = 월요일 05:00 KST
  workflow_dispatch:
    inputs:
      force_issue:
        description: '결과를 Issue로 강제 생성 (수동 검증용)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write   # commit·push
  issues: write     # 결과 issue 생성

jobs:
  update:
    runs-on: ubuntu-latest
    # 첫 실행(캐시 미스 = 풀스캔)은 60분+, 이후 증분 갱신은 5~10분.
    # 안전 마진 포함하여 180분(3시간)으로 설정.
    timeout-minutes: 180

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # data/ 폴더 캐시 — .gitignore에 의해 git에서 제외되므로
      # 워크플로 환경에서는 별도 캐시 없이는 매번 풀스캔(API 350+건).
      # actions/cache의 자동 Post는 워크플로 success 시에만 작동 → 검증 fail 시 캐시 미저장.
      # cache/restore + cache/save로 분리하여 빌드 성공 시 검증 결과 무관하게 캐시 저장 보장.
      - name: data/ 캐시 복원
        id: cache-data
        uses: actions/cache/restore@v4
        with:
          path: data
          key: law-history-data-v1-${{ github.run_id }}
          restore-keys: |
            law-history-data-v1-

      - name: 캐시 상태 출력
        run: |
          if [ -d data ] && [ -n "$(ls -A data 2>/dev/null)" ]; then
            echo "📚 캐시 복원 성공 ($(ls data/*.json 2>/dev/null | wc -l)개 JSON)"
            ls -lah data/*.json 2>/dev/null | head -10 || true
          else
            echo "📭 캐시 없음 — 풀스캔 진행 (첫 실행 또는 캐시 만료 7일 경과)"
          fi

      - name: 빌드 실행 (update_all.py)
        id: build
        run: |
          export PYTHONIOENCODING=utf-8
          python update_all.py

      # 캐시 저장 — 빌드 성공 시 검증 결과 무관하게 저장 (다음 워크플로 풀스캔 회피)
      - name: data/ 캐시 저장
        if: always() && steps.build.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: data
          key: law-history-data-v1-${{ github.run_id }}

      - name: 빌드 산출물 검증 (회귀 처리)
        id: validate
        run: |
          set -e

          # ─────────────────────────────────────────────
          # 카테고리 A: 핵심 파일 누락 = 빌드 자체 깨짐 → fail 차단
          # ─────────────────────────────────────────────
          test -f viewer.html || { echo "::error::viewer.html 없음"; exit 1; }
          SIZE=$(stat -c%s viewer.html)
          if [ $SIZE -lt 50000 ]; then
            echo "::error::viewer.html 크기 비정상 ($SIZE bytes < 50KB)"
            exit 1
          fi

          test -f web_data/data_core.js || { echo "::error::data_core.js 없음"; exit 1; }
          test -f web_data/data_tbl_history.js || { echo "::error::data_tbl_history.js 없음"; exit 1; }
          test -f web_data/pdfjs/web/viewer.html || { echo "::error::PDF.js viewer 없음"; exit 1; }

          test -f data/attached_tables.json || { echo "::error::attached_tables.json 없음"; exit 1; }
          AT_SIZE=$(stat -c%s data/attached_tables.json)
          if [ $AT_SIZE -lt 5000000 ]; then
            echo "::error::attached_tables.json 크기 비정상 ($AT_SIZE bytes < 5MB)"
            exit 1
          fi

          # gview 부활 — 사용자 화면 깨짐 직접 원인 → fail 차단
          if grep -q 'docs.google.com/gview' viewer.html; then
            echo "::error::gview 문자열 발견 — 모바일 PDF 회귀"
            exit 1
          fi

          # PDF.js 경로 누락 → fail 차단
          if ! grep -q 'web_data/pdfjs/web/viewer.html' viewer.html; then
            echo "::error::PDF.js viewer 경로 누락"
            exit 1
          fi

          # history 폴백 코드 누락 → fail 차단
          if ! grep -q 'tblHistoryData' viewer.html; then
            echo "::error::history 폴백 코드 누락"
            exit 1
          fi

          # ─────────────────────────────────────────────
          # 카테고리 B: 부분 회귀 = 자동 복원 (옛 web_data 유지) + 알림
          # ─────────────────────────────────────────────
          REGRESSION_DETECTED=""

          # HWP URL 회귀 검사 — Python re.findall로 카운트 (grep false negative 회피)
          # 정상 빌드 시 시행령 13 + 시행규칙 264 = 약 277개 HWP URL 들어감.
          # 100개 미만이면 명확한 회귀로 판정.
          HWP_COUNT=$(python3 -c "import re; print(len(re.findall(r'\"HWP\":\"/LSW/', open('web_data/data_core.js', encoding='utf-8').read())))")
          echo "🔍 HWP URL 카운트: $HWP_COUNT (정상 ≈ 277, 임계값 100)"
          if [ "$HWP_COUNT" -lt 100 ]; then
            echo "::warning::HWP URL 누락 감지 (count=$HWP_COUNT) — 옛 viewer/web_data 복원"
            git checkout HEAD -- viewer.html web_data/ 2>/dev/null || true
            REGRESSION_DETECTED="HWP URL 누락 (count=$HWP_COUNT)"
          fi

          # 회귀 결과를 outputs로 전달
          if [ -n "$REGRESSION_DETECTED" ]; then
            echo "regression=true" >> "$GITHUB_OUTPUT"
            echo "regression_reason=$REGRESSION_DETECTED" >> "$GITHUB_OUTPUT"
            echo "⚠️ 부분 회귀 감지 — viewer/web_data는 옛 상태 유지, 데이터 부분만 갱신됩니다"
          else
            echo "regression=false" >> "$GITHUB_OUTPUT"
            echo "✅ 빌드 검증 통과 (viewer.html: $(numfmt --to=iec $SIZE))"
          fi

      # 별표/별지 추가·제거·교체 감지 — 사용자 알림용
      # checkout 시점의 attached_tables.json(git HEAD) vs 방금 빌드한 attached_tables.json 비교.
      # 첫 실행 시점(git에 attached_tables.json 미추적 상태)은 비교 건너뜀 — 모든 별표가
      # "추가"로 표시되어 노이즈가 되는 것을 막는다.
      - name: 별표/별지 변경 감지
        id: table_alarm
        run: |
          if git cat-file -e HEAD:data/attached_tables.json 2>/dev/null; then
            git show HEAD:data/attached_tables.json > /tmp/prev_attached_tables.json
            python compare_attached_tables.py /tmp/prev_attached_tables.json data/attached_tables.json
          else
            echo "📭 attached_tables.json git 추적 첫 실행 — 비교 건너뜀"
            echo "has_table_changes=false" >> "$GITHUB_OUTPUT"
            echo "table_changes_count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: 변경사항 감지
        id: changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "📭 변경사항 없음 (도로교통법 개정 없음)"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"

            # 통계 (한 줄)
            STATS=$(git diff --cached --shortstat | sed 's/^ //')
            echo "stats=$STATS" >> "$GITHUB_OUTPUT"

            # 변경 파일 목록 (최대 30개) — multiline output
            {
              echo "changed_files<<EOF_FILES_MARKER"
              git diff --cached --name-only | head -30
              echo "EOF_FILES_MARKER"
            } >> "$GITHUB_OUTPUT"

            echo "📦 변경사항: $STATS"
          fi

      - name: 자동 commit & push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          DATE_KST=$(TZ=Asia/Seoul date +'%Y-%m-%d')
          git commit -m "chore: 자동 갱신 - $DATE_KST 도로교통법 데이터 정기 빌드

          GitHub Actions 매주 자동 실행 (.github/workflows/update.yml)
          "
          git push origin master

      - name: ✅ 성공 Issue 생성
        if: success() && (steps.changes.outputs.has_changes == 'true' || inputs.force_issue == 'true')
        uses: actions/github-script@v7
        env:
          HAS_CHANGES: ${{ steps.changes.outputs.has_changes }}
          STATS: ${{ steps.changes.outputs.stats }}
          FILES: ${{ steps.changes.outputs.changed_files }}
          HAS_TABLE_CHANGES: ${{ steps.table_alarm.outputs.has_table_changes }}
          TABLE_CHANGES_TEXT: ${{ steps.table_alarm.outputs.table_changes_text }}
          TABLE_CHANGES_COUNT: ${{ steps.table_alarm.outputs.table_changes_count }}
          REGRESSION: ${{ steps.validate.outputs.regression }}
          REGRESSION_REASON: ${{ steps.validate.outputs.regression_reason }}
        with:
          script: |
            const tz = { timeZone: 'Asia/Seoul' };
            const now = new Date();
            const dateKst = now.toLocaleDateString('ko-KR', tz).replace(/\. /g, '-').replace('.', '');
            const timeKst = now.toLocaleString('ko-KR', tz);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const hasChanges = process.env.HAS_CHANGES === 'true';
            const stats = process.env.STATS || '';
            const files = (process.env.FILES || '').trim();
            const hasTableChanges = process.env.HAS_TABLE_CHANGES === 'true';
            const tableChangesText = (process.env.TABLE_CHANGES_TEXT || '').trim();
            const tableChangesCount = process.env.TABLE_CHANGES_COUNT || '0';
            const regression = process.env.REGRESSION === 'true';
            const regressionReason = process.env.REGRESSION_REASON || '';

            let title, body;
            if (hasChanges) {
              // 회귀 또는 별표 변경 감지 시 제목에 표시
              let titleSuffix = '';
              if (regression) titleSuffix += ` ⚠️ 부분 회귀(${regressionReason})`;
              if (hasTableChanges) titleSuffix += ` ⚠️ 별표 변경(${tableChangesCount}건)`;
              title = `[클로드 코드가 회신] 자동 갱신 성공 - ${dateKst}${titleSuffix}`;
              const bodyLines = [
                '매주 정기 자동 갱신이 성공적으로 완료되었습니다.',
                '',
                `**실행 시각**: ${timeKst}`,
                ''
              ];
              // 회귀 감지 섹션 — 있을 때만
              if (regression) {
                bodyLines.push('## ⚠️ 부분 회귀 감지 — 자동 복원');
                bodyLines.push('');
                bodyLines.push('```');
                bodyLines.push(`회귀 종류: ${regressionReason}`);
                bodyLines.push('처리: viewer.html과 web_data/는 옛 정상 상태를 유지');
                bodyLines.push('       data/ 폴더(별표 데이터, table_pdfs)는 새 빌드 결과 반영');
                bodyLines.push('       사용자 화면은 옛 정상 상태로 작동');
                bodyLines.push('```');
                bodyLines.push('');
                bodyLines.push('📌 다음 단계:');
                bodyLines.push('  Claude에게 "워크플로 회귀 발생했어, 디버그 부탁해" 알려주시면 함께 점검합니다.');
                bodyLines.push('  (사용자 화면은 정상 작동 중이라 긴급은 아님)');
                bodyLines.push('');
              }
              // 별표 변경 섹션 — 있을 때만 본문 상단에 표시
              if (hasTableChanges) {
                bodyLines.push('## ⚠️ 별표/별지 변경 감지');
                bodyLines.push('');
                bodyLines.push('```');
                bodyLines.push(tableChangesText);
                bodyLines.push('```');
                bodyLines.push('');
              }
              bodyLines.push(
                '**변경 통계**:',
                '```',
                stats,
                '```',
                '',
                '**변경 파일** (최대 30개):',
                '```',
                files,
                '```',
                '',
                '**새 뷰어 배포**: 1~2분 후 GitHub Pages 반영',
                'https://evergreenedu-collab.github.io/road-traffic-law-viewer/viewer.html',
                '',
                `**워크플로 실행 로그**: ${runUrl}`,
                '',
                '---',
                '*이 메시지는 `.github/workflows/update.yml` 워크플로가 자동 발송한 것입니다.*',
                '*제목 prefix `[클로드 코드가 회신]`로 정상 알림임을 식별할 수 있습니다.*'
              );
              body = bodyLines.join('\n');
            } else {
              title = `[클로드 코드가 회신] 자동 갱신 점검 - ${dateKst} (변경 없음)`;
              body = [
                '수동 트리거 또는 정기 점검 결과: **변경사항 없음** (도로교통법 개정 없음 — 정상 동작 중).',
                '',
                `**실행 시각**: ${timeKst}`,
                `**워크플로 실행 로그**: ${runUrl}`,
                '',
                '---',
                '*이 메시지는 `.github/workflows/update.yml` 워크플로가 자동 발송한 것입니다.*'
              ].join('\n');
            }

            const res = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title, body,
            });
            core.info(`✅ Issue 생성: ${res.data.html_url}`);

      - name: ⚠️ 실패 Issue 생성
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const tz = { timeZone: 'Asia/Seoul' };
            const now = new Date();
            const dateKst = now.toLocaleDateString('ko-KR', tz).replace(/\. /g, '-').replace('.', '');
            const timeKst = now.toLocaleString('ko-KR', tz);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const title = `[클로드 코드가 회신] ⚠️ 자동 갱신 실패 - ${dateKst}`;
            const body = [
              '매주 정기 자동 갱신 워크플로가 **실패**했습니다.',
              '',
              `**실행 시각**: ${timeKst}`,
              '',
              '**점검 필요**: 아래 워크플로 실행 페이지에서 로그를 확인해주세요.',
              runUrl,
              '',
              '**가능한 원인**:',
              '- 법령정보센터 API 응답 변경 / 일시 장애',
              '- 데이터 형식 변경 (정규식·파싱 깨짐)',
              '- 빌드 검증 실패 (회귀 차단됨 — 사이트는 직전 정상 상태 유지)',
              '',
              '---',
              '*이 메시지는 `.github/workflows/update.yml` 워크플로가 자동 발송한 것입니다.*',
              '*제목 prefix `[클로드 코드가 회신]`로 정상 알림임을 식별할 수 있습니다.*'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title, body,
            });
